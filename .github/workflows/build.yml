name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # 固定 22.04 更稳定
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip3 install --user buildozer
      - name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin:~/.buildozer/android/platform/android-sdk/tools/bin
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          # 设置国内镜像源加速 SDK/NDK 下载
          export BUILDozER_SDK_URL=https://mirrors.ustc.edu.cn/android/android-sdk/
          echo "JAVA_HOME=$JAVA_HOME"
          echo "PATH=$PATH"
          buildozer android debug 2>&1
        shell: bash
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PowerLifting-APK
          path: bin/*.apk
