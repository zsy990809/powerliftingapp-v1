name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git zip unzip openjdk-17-jdk autoconf libtool \
            pkg-config zlib1g-dev cmake libffi-dev libssl-dev python3-pip python3-venv
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Setup Buildozer
        run: |
          python3 -m venv buildozer_venv
          source buildozer_venv/bin/activate
          pip install --upgrade pip wheel cython==0.29.37
          pip install buildozer

      - name: Build
        run: |
          source buildozer_venv/bin/activate
          set -x
          python3 -m buildozer --help
          python3 -m buildozer android debug 2>&1 || true
          echo "--- Exit: $? ---"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lwup-apk
          path: bin/*.apk
