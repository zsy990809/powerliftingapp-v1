name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            cmake libffi-dev libssl-dev python3-pip
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel cython buildozer 2>&1

      - name: Debug environment
        run: |
          echo "=== Python ==="
          python3 --version
          echo "=== Pip ==="
          pip list 2>/dev/null | grep -i -E "cython|buildozer|kivy|cy"
          echo "=== Java ==="
          java -version 2>&1
          echo "=== JAVA_HOME ==="
          echo $JAVA_HOME
          echo "=== Buildozer ==="
          which buildozer
          buildozer --version 2>&1 || true
          echo "=== Spec ==="
          ls -la buildozer.spec
          head -30 buildozer.spec

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lwup-apk
          path: bin/*.apk
